<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UR3 Robot Simulation | Oracle Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020617;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
        }

        .glass-ui {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <!-- UI Overlay -->
    <div class="fixed top-8 left-8 z-20 space-y-4">
        <div class="glass-ui rounded-3xl p-6 shadow-2xl w-80">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center text-blue-400">
                    <i class="fa-solid fa-robot text-xl"></i>
                </div>
                <div>
                    <h2 class="text-white font-bold text-lg">UR3 Simulation</h2>
                    <p class="text-slate-400 text-xs uppercase tracking-widest font-mono">Box Folding Lab</p>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-white/5 rounded-2xl p-4 space-y-2">
                    <p class="text-slate-400 text-xs">Step 1: Click on the table to place the box.</p>
                    <p class="text-slate-400 text-xs">Step 2: Press 'Start' to begin the pick sequence.</p>
                </div>

                <button id="btnStart"
                    class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-play"></i> Start Sequence
                </button>
                <button id="btnReset"
                    class="w-full py-4 bg-white/5 hover:bg-red-500/20 text-white rounded-2xl font-bold transition-all">
                    Reset Scene
                </button>
            </div>
        </div>

        <div class="glass-ui rounded-full px-6 py-3 border border-white/5 inline-flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            <span id="statusLabel" class="text-white text-xs font-bold uppercase tracking-widest">System Ready</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration ---
        const TABLE_SIZE = { x: 120.2, z: 121 };
        const BOX_SIZE = { x: 17, y: 2, z: 25 };
        const L1 = 24.3; // Upper arm length
        const L2 = 21.3; // Forearm length

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(120, 100, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(100, 200, 100);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // --- Table ---
        const table = new THREE.Mesh(
            new THREE.BoxGeometry(TABLE_SIZE.x, 5, TABLE_SIZE.z),
            new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.1 })
        );
        table.position.y = -2.5;
        table.receiveShadow = true;
        scene.add(table);

        const grid = new THREE.GridHelper(200, 20, 0x334155, 0x1e293b);
        grid.position.y = 0.05;
        scene.add(grid);

        // --- Folding Station (Target) ---
        const station = new THREE.Mesh(
            new THREE.BoxGeometry(30, 2, 30),
            new THREE.MeshStandardMaterial({ color: 0x0f172a, emissive: 0x3b82f6, emissiveIntensity: 0.2 })
        );
        station.position.set(-40, 1, -40);
        scene.add(station);

        // --- UR3 Robot Model ---
        const robotBase = new THREE.Group();
        scene.add(robotBase);

        function createJoint(color = 0x64748b) {
            return new THREE.Mesh(
                new THREE.CylinderGeometry(5, 5, 8, 32),
                new THREE.MeshStandardMaterial({ color: color, metalness: 0.8, roughness: 0.2 })
            );
        }

        function createLink(length, radius = 3) {
            const link = new THREE.Mesh(
                new THREE.CylinderGeometry(radius, radius, length, 32),
                new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.8, roughness: 0.2 })
            );
            link.rotation.x = Math.PI / 2;
            link.position.z = length / 2;
            return link;
        }

        const baseJoint = createJoint(0x1e293b);
        robotBase.add(baseJoint);

        const shoulder = new THREE.Group();
        shoulder.position.y = 8;
        robotBase.add(shoulder);

        const upperArm = new THREE.Group();
        upperArm.position.y = 10;
        shoulder.add(upperArm);
        const shoulderJointMesh = createJoint();
        shoulderJointMesh.rotation.z = Math.PI / 2;
        upperArm.add(shoulderJointMesh);
        const link1 = createLink(L1);
        upperArm.add(link1);

        const forearm = new THREE.Group();
        forearm.position.z = L1;
        upperArm.add(forearm);
        const elbowJointMesh = createJoint();
        elbowJointMesh.rotation.z = Math.PI / 2;
        forearm.add(elbowJointMesh);
        const link2 = createLink(L2);
        forearm.add(link2);

        const ee = new THREE.Group();
        ee.position.z = L2;
        forearm.add(ee);
        const gripper = new THREE.Mesh(
            new THREE.CylinderGeometry(4, 4, 6, 16),
            new THREE.MeshStandardMaterial({ color: 0x3b82f6 })
        );
        gripper.rotation.x = Math.PI / 2;
        ee.add(gripper);

        // --- Box ---
        const box = new THREE.Mesh(
            new THREE.BoxGeometry(BOX_SIZE.x, BOX_SIZE.y, BOX_SIZE.z),
            new THREE.MeshStandardMaterial({ color: 0x92400e })
        );
        box.position.set(30, 1, 30);
        scene.add(box);

        // --- IK Logic (Analytical) ---
        function solveIK(target) {
            const dx = target.x - robotBase.position.x;
            const dz = target.z - robotBase.position.z;
            const distHorizontal = Math.sqrt(dx * dx + dz * dz);
            const distVertical = (target.y + 5) - (shoulder.position.y + upperArm.position.y);

            const dist = Math.sqrt(distHorizontal * distHorizontal + distVertical * distVertical);
            if (dist > L1 + L2) return null;

            const cosA = (L1 * L1 + dist * dist - L2 * L2) / (2 * L1 * dist);
            const angleA = Math.acos(THREE.MathUtils.clamp(cosA, -1, 1));

            const cosB = (L1 * L1 + L2 * L2 - dist * dist) / (2 * L1 * L2);
            const angleB = Math.acos(THREE.MathUtils.clamp(cosB, -1, 1));

            const phi = Math.atan2(distVertical, distHorizontal);

            return {
                base: Math.atan2(dx, dz),
                shoulder: -(phi + angleA) + Math.PI / 2,
                elbow: -(Math.PI - angleB)
            }
        }

        // --- State Manager ---
        let currentStatus = "idle";
        let isMoving = false;
        let attachToGripper = false;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            if (isMoving) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(table);
            if (intersects.length > 0) {
                box.position.copy(intersects[0].point);
                box.position.y = 1;
                document.getElementById('statusLabel').innerText = "Box Position Set";
            }
        });

        document.getElementById('btnStart').onclick = () => {
            isMoving = true;
            currentStatus = "picking";
            document.getElementById('statusLabel').innerText = "Sequence: Picking Box";
        };

        document.getElementById('btnReset').onclick = () => {
            location.reload();
        };

        // --- Animation ---
        function animate() {
            requestAnimationFrame(animate);

            if (isMoving) {
                const targetGoal = (currentStatus === "picking") ? box.position : station.position.clone().add(new THREE.Vector3(0, 10, 0));
                const ik = solveIK(targetGoal);

                if (ik) {
                    shoulder.rotation.y = THREE.MathUtils.lerp(shoulder.rotation.y, ik.base, 0.05);
                    upperArm.rotation.x = THREE.MathUtils.lerp(upperArm.rotation.x, ik.shoulder, 0.05);
                    forearm.rotation.x = THREE.MathUtils.lerp(forearm.rotation.x, ik.elbow, 0.05);
                }

                const gripperPos = new THREE.Vector3();
                gripper.getWorldPosition(gripperPos);

                if (gripperPos.distanceTo(targetGoal) < 3) {
                    if (currentStatus === "picking") {
                        box.parent = ee;
                        box.position.set(0, 0, 0);
                        box.rotation.set(0, 0, 0);
                        currentStatus = "moving_to_station";
                        document.getElementById('statusLabel').innerText = "Sequence: Moving to Station";
                    } else if (currentStatus === "moving_to_station") {
                        box.parent = scene;
                        box.position.copy(station.position).add(new THREE.Vector3(0, 5, 0));
                        isMoving = false;
                        currentStatus = "done";
                        document.getElementById('statusLabel').innerText = "Task Complete!";
                    }
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

</html>
