<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UR3 Robot Simulation | Oracle Engineering</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script
        type="importmap">{"imports":{"three":"https://unpkg.com/three@0.154.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.154.0/examples/jsm/"}}</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #060b17;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            overflow: hidden
        }

        canvas {
            display: block
        }

        .glass {
            background: rgba(10, 20, 40, .82);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(99, 179, 237, .14);
            border-radius: 18px
        }

        #ui-left {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            width: 270px;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .panel-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #60a5fa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 7px
        }

        .glass .inner {
            padding: 16px 18px
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 10px;
            background: rgba(255, 255, 255, .04);
            border-radius: 9px;
            margin-bottom: 7px;
            font-size: 12px
        }

        .row span:first-child {
            color: #94a3b8
        }

        .row span:last-child {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700
        }

        .idle {
            color: #64748b
        }

        .run {
            color: #facc15;
            animation: blink 1s infinite
        }

        .ok {
            color: #34d399
        }

        .blue {
            color: #60a5fa
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        /* Zone grid */
        .zone-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px
        }

        .zone-btn {
            padding: 9px 4px;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 10px;
            background: rgba(255, 255, 255, .04);
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all .2s;
            text-align: center
        }

        .zone-btn:hover {
            background: rgba(59, 130, 246, .2);
            border-color: rgba(59, 130, 246, .4);
            color: #93c5fd
        }

        .zone-btn.selected {
            background: rgba(59, 130, 246, .3);
            border-color: #3b82f6;
            color: #fff;
            box-shadow: 0 0 12px rgba(59, 130, 246, .4)
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .btn-main:hover:not(:disabled) {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, .35)
        }

        .btn-main:disabled {
            opacity: .35;
            cursor: not-allowed
        }

        .btn-sec {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            background: rgba(255, 255, 255, .04);
            color: #94a3b8;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s
        }

        .btn-sec:hover {
            background: rgba(255, 255, 255, .1);
            color: #fff
        }

        .cam-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px
        }

        .cam-btn {
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, .07);
            border-radius: 9px;
            background: rgba(255, 255, 255, .03);
            color: #64748b;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
            font-family: 'JetBrains Mono', monospace
        }

        .cam-btn:hover,
        .cam-btn.act {
            background: rgba(59, 130, 246, .2);
            border-color: rgba(59, 130, 246, .4);
            color: #60a5fa
        }

        /* Phase sidebar */
        #phases {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .ph {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 9px;
            background: rgba(10, 20, 40, .7);
            border: 1px solid rgba(255, 255, 255, .05);
            font-size: 11px;
            color: #475569;
            transition: all .4s;
            white-space: nowrap
        }

        .ph.act {
            background: rgba(37, 99, 235, .22);
            border-color: rgba(59, 130, 246, .4);
            color: #93c5fd
        }

        .ph.done {
            color: #34d399;
            border-color: rgba(52, 211, 153, .25);
            background: rgba(5, 46, 22, .25)
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #1e3a5f;
            flex-shrink: 0;
            transition: all .4s
        }

        .ph.act .dot {
            background: #3b82f6;
            box-shadow: 0 0 8px #3b82f6;
            animation: blink 1s infinite
        }

        .ph.done .dot {
            background: #34d399
        }

        /* Bottom info */
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20
        }

        .pill {
            background: rgba(10, 20, 40, .85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 179, 237, .2);
            border-radius: 999px;
            padding: 11px 24px;
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap
        }

        .pill i {
            color: #60a5fa
        }
    </style>
</head>

<body>
    <!-- LEFT PANEL -->
    <div id="ui-left">
        <!-- Status -->
        <div class="glass">
            <div class="inner">
                <div class="panel-title"><i class="fa-solid fa-robot"></i> UR3 Robot Arm</div>
                <div class="row"><span>Status</span><span id="sts" class="idle">IDLE</span></div>
                <div class="row"><span>Phase</span><span id="ph-cur" class="blue">—</span></div>
                <div class="row"><span>Box</span><span id="box-sts" class="idle">ยังไม่วาง</span></div>
            </div>
        </div>

        <!-- Zone selection -->
        <div class="glass">
            <div class="inner">
                <div class="panel-title"><i class="fa-solid fa-table-cells"></i> เลือกตำแหน่งวางกล่อง</div>
                <div class="zone-grid">
                    <button class="zone-btn" id="z-A1" onclick="placeBox('A1')">A1</button>
                    <button class="zone-btn" id="z-A2" onclick="placeBox('A2')">A2</button>
                    <button class="zone-btn" id="z-A3" onclick="placeBox('A3')">A3</button>
                    <button class="zone-btn" id="z-B1" onclick="placeBox('B1')">B1</button>
                    <button class="zone-btn" id="z-B2" onclick="placeBox('B2')">B2</button>
                    <button class="zone-btn" id="z-B3" onclick="placeBox('B3')">B3</button>
                </div>
                <button class="btn-main" id="btn-start" disabled>
                    <i class="fa-solid fa-play"></i> Start Pick & Place
                </button>
                <button class="btn-sec" id="btn-reset">
                    <i class="fa-solid fa-rotate-left"></i> Reset
                </button>
            </div>
        </div>

        <!-- Camera -->
        <div class="glass">
            <div class="inner">
                <div class="panel-title"><i class="fa-solid fa-video"></i> Camera</div>
                <div class="cam-grid">
                    <button class="cam-btn act" id="cam-iso" onclick="setCamera('iso')">ISO</button>
                    <button class="cam-btn" id="cam-front" onclick="setCamera('front')">FRONT</button>
                    <button class="cam-btn" id="cam-side" onclick="setCamera('side')">SIDE</button>
                    <button class="cam-btn" id="cam-top" onclick="setCamera('top')">TOP</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PHASE SIDEBAR -->
    <div id="phases">
        <div class="ph" id="p0">
            <div class="dot"></div>① Approach — ยื่นแขนไปเหนือกล่อง
        </div>
        <div class="ph" id="p1">
            <div class="dot"></div>② Pick — โค้งลงดูดกล่อง
        </div>
        <div class="ph" id="p2">
            <div class="dot"></div>③ Lift — ยกกล่องขึ้น
        </div>
        <div class="ph" id="p3">
            <div class="dot"></div>④ Transit — เคลื่อนไปแท่นพับ
        </div>
        <div class="ph" id="p4">
            <div class="dot"></div>⑤ Place & Fold — วางและพับกล่อง
        </div>
    </div>

    <!-- BOTTOM INFO -->
    <div id="info">
        <div class="pill" id="info-txt"><i class="fa-solid fa-table-cells"></i><span>เลือกตำแหน่ง A1-B3
                เพื่อวางกล่องกระดาษบนโต๊ะ</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ── SCENE ─────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060b17);
        scene.fog = new THREE.FogExp2(0x060b17, 0.01);

        const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ctrl = new OrbitControls(camera, renderer.domElement);
        ctrl.enableDamping = true; ctrl.dampingFactor = 0.08;
        ctrl.target.set(0, 0.4, 0);
        ctrl.minDistance = 0.4; ctrl.maxDistance = 6;

        // ── LIGHTING ──────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0x162030, 2.5));
        const sun = new THREE.DirectionalLight(0xd0e8ff, 3);
        sun.position.set(2, 5, 2); sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -3; sun.shadow.camera.right = 3;
        sun.shadow.camera.top = 3; sun.shadow.camera.bottom = -3;
        scene.add(sun);
        scene.add(new THREE.DirectionalLight(0x4060bb, 0.6)).position.set(-2, 2, -2);
        const robotLight = new THREE.PointLight(0x4080ff, 2, 4);
        robotLight.position.set(0, 1.2, 0);
        scene.add(robotLight);

        // ── FLOOR + GRID ──────────────────────────────────────────────
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(16, 16),
            new THREE.MeshStandardMaterial({ color: 0x0a0e1a, roughness: .9 })
        );
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);
        const grid = new THREE.GridHelper(16, 50, 0x1a3255, 0x111d30);
        grid.position.y = 0.002; scene.add(grid);

        // ── TABLE (120.2 × 121 cm) ────────────────────────────────────
        const TW = 1.21, TD = 1.202, TH = 0.72;
        const TABLE_TOP = TH + 0.03;
        const tMat = new THREE.MeshStandardMaterial({ color: 0x263344, roughness: .55, metalness: .35 });
        const tTop = new THREE.Mesh(new THREE.BoxGeometry(TW, .04, TD), tMat);
        tTop.position.set(0, TH + .02, 0); tTop.receiveShadow = true; tTop.castShadow = true;
        scene.add(tTop);
        // Blue glow edge
        const edgeMesh = new THREE.Mesh(new THREE.BoxGeometry(TW + .003, .003, TD + .003), new THREE.MeshBasicMaterial({ color: 0x1d5fbd }));
        edgeMesh.position.y = TH + .041; scene.add(edgeMesh);
        // Legs
        const legM = new THREE.MeshStandardMaterial({ color: 0x0d1826, metalness: .7, roughness: .4 });
        [[-.57, .36, -.58], [.57, .36, -.58], [-.57, .36, .58], [.57, .36, .58]].forEach(p => {
            const l = new THREE.Mesh(new THREE.BoxGeometry(.045, TH, .045), legM);
            l.position.set(...p); l.castShadow = true; scene.add(l);
        });

        // ── FOLDING STATION (right of table) ─────────────────────────
        // Inspired by video: flat platform with side guides + pressing bar
        const FOLD_X = TW / 2 + 0.38;
        const FOLD_Y = TABLE_TOP;
        const FOLD_Z = 0.0;

        const foldMatBase = new THREE.MeshStandardMaterial({ color: 0x1a2c42, roughness: .7, metalness: .5 });
        const foldMatGuide = new THREE.MeshStandardMaterial({ color: 0x1e4070, roughness: .5, metalness: .7 });
        const foldMatAccent = new THREE.MeshStandardMaterial({ color: 0x0ea5e9, emissive: 0x0ea5e9, emissiveIntensity: .3 });

        // Base platform
        const fBase = new THREE.Mesh(new THREE.BoxGeometry(.5, .025, .55), foldMatBase);
        fBase.position.set(FOLD_X, FOLD_Y, FOLD_Z);
        scene.add(fBase);

        // Side guides (left & right)
        const gW = .02, gH = .12, gD = .55;
        [-1, 1].forEach(s => {
            const g = new THREE.Mesh(new THREE.BoxGeometry(gW, gH, gD), foldMatGuide);
            g.position.set(FOLD_X + s * .24, FOLD_Y + gH / 2, FOLD_Z);
            scene.add(g);
        });
        // Front & back guides
        [-1, 1].forEach(s => {
            const g = new THREE.Mesh(new THREE.BoxGeometry(.7, .08, .02), foldMatGuide);
            g.position.set(FOLD_X, FOLD_Y + .04, FOLD_Z + s * .265);
            scene.add(g);
        });
        // Pressing bar (top horizontal bar)
        const pressBar = new THREE.Mesh(new THREE.BoxGeometry(.52, .025, .03), new THREE.MeshStandardMaterial({ color: 0x2563eb, metalness: .9, roughness: .2 }));
        pressBar.position.set(FOLD_X, FOLD_Y + .14, FOLD_Z);
        scene.add(pressBar);
        // Bottom fold line marker (cyan glow strip)
        const glowStrip = new THREE.Mesh(new THREE.BoxGeometry(.48, .003, .48), foldMatAccent);
        glowStrip.position.set(FOLD_X, FOLD_Y + .013, FOLD_Z);
        scene.add(glowStrip);
        // Accent point light on station
        const stLight = new THREE.PointLight(0x0ea5e9, .8, 1.5);
        stLight.position.set(FOLD_X, FOLD_Y + .3, FOLD_Z);
        scene.add(stLight);

        // ── ZONE LABELS on table ──────────────────────────────────────
        // Visual markers for zones
        const ZONES = {
            A1: { x: -.32, z: -.32 }, A2: { x: 0, z: -.32 }, A3: { x: .32, z: -.32 },
            B1: { x: -.32, z: .18 }, B2: { x: 0, z: .18 }, B3: { x: .32, z: .18 },
        };
        const zoneMeshes = {};
        Object.entries(ZONES).forEach(([k, v]) => {
            const m = new THREE.Mesh(
                new THREE.PlaneGeometry(.22, .18),
                new THREE.MeshBasicMaterial({ color: 0x1e3a5f, transparent: true, opacity: .4, side: THREE.DoubleSide })
            );
            m.rotation.x = -Math.PI / 2;
            m.position.set(v.x, TABLE_TOP + .002, v.z);
            m.userData.key = k;
            scene.add(m);
            zoneMeshes[k] = m;
        });

        // ── UR3 ARM ───────────────────────────────────────────────────
        const RX = 0, RZ = -.05, RY = TABLE_TOP;

        const mDark = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: .4, metalness: .75 });
        const mBlue = new THREE.MeshStandardMaterial({ color: 0x1d4ed8, roughness: .25, metalness: .85 });
        const mJoint = new THREE.MeshStandardMaterial({ color: 0x374151, roughness: .3, metalness: .9 });
        const mGlow = new THREE.MeshStandardMaterial({ color: 0x60a5fa, emissive: 0x1d4ed8, emissiveIntensity: .6, roughness: .2, metalness: .9 });
        const mSuction = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: .95 });

        function cyl(rt, rb, h, seg, mat) { return new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat); }
        function box(w, h, d, mat) { return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat); }

        // J0 = base group (rotate Y = pan left/right)
        const J0 = new THREE.Group(); J0.position.set(RX, RY, RZ);

        // Base cylinder
        const baseCyl = cyl(.072, .085, .09, 24, mJoint); baseCyl.position.y = .045; J0.add(baseCyl);
        const baseRing = cyl(.068, .068, .016, 24, mGlow); baseRing.position.y = .085; J0.add(baseRing);

        // J1 = shoulder joint group (rotate X = tilt forward/back)
        const J1 = new THREE.Group(); J1.position.y = .09; J0.add(J1);
        const shJoint = cyl(.058, .058, .1, 20, mJoint); shJoint.rotation.z = Math.PI / 2; J1.add(shJoint);

        // J2 = upper arm (rotates X at shoulder)
        const J2 = new THREE.Group(); J1.add(J2);
        const upperArm = box(.042, .248, .042, mBlue); upperArm.position.y = .124; J2.add(upperArm);
        const elbowJoint = cyl(.052, .052, .065, 20, mJoint); elbowJoint.rotation.z = Math.PI / 2; elbowJoint.position.y = .248; J2.add(elbowJoint);

        // J3 = forearm (rotates X at elbow)
        const J3 = new THREE.Group(); J3.position.y = .248; J2.add(J3);
        const forearm = box(.036, .215, .036, mBlue); forearm.position.y = .108; J3.add(forearm);
        const w1Joint = cyl(.042, .042, .055, 20, mGlow); w1Joint.rotation.z = Math.PI / 2; w1Joint.position.y = .215; J3.add(w1Joint);

        // J4 = wrist1 (rotates X)
        const J4 = new THREE.Group(); J4.position.y = .215; J3.add(J4);
        const w1Link = box(.032, .09, .032, mDark); w1Link.position.y = .045; J4.add(w1Link);
        const w2Joint = cyl(.036, .036, .048, 20, mGlow); w2Joint.rotation.x = Math.PI / 2; w2Joint.position.y = .09; J4.add(w2Joint);

        // J5 = wrist2 (rotates Y)
        const J5 = new THREE.Group(); J5.position.y = .09; J4.add(J5);
        const w2Link = box(.032, .09, .032, mDark); w2Link.position.y = .045; J5.add(w2Link);

        // J6 = end effector
        const J6 = new THREE.Group(); J6.position.y = .09; J5.add(J6);
        const eeRod = cyl(.012, .012, .05, 12, mDark); eeRod.position.y = .025; J6.add(eeRod);
        const suctionCup = cyl(.032, .04, .012, 20, mSuction); suctionCup.position.y = .056; J6.add(suctionCup);
        // Vacuum indicator ring
        const vacRing = cyl(.03, .03, .003, 20, mGlow); vacRing.position.y = .063; J6.add(vacRing);
        const suctionGlow = new THREE.PointLight(0x60a5fa, 0, .4); suctionGlow.position.y = .06; J6.add(suctionGlow);

        scene.add(J0);

        // ── BOX ───────────────────────────────────────────────────────
        const BW = .25, BD = .17, BH = .012; // flat cardboard (25×17cm, 1.2cm thick)
        const cardMat = new THREE.MeshStandardMaterial({ color: 0xe07b20, roughness: .85 });
        const cardTop = new THREE.MeshStandardMaterial({ color: 0xc96d18, roughness: .85 });
        const lineMat = new THREE.MeshBasicMaterial({ color: 0x7c3d0c });
        // 3D folded box material
        const foldedMat = new THREE.MeshStandardMaterial({ color: 0xd97706, roughness: .8 });
        const foldedInner = new THREE.MeshStandardMaterial({ color: 0xb45309, roughness: .85 });

        let boxGroup = null;
        let boxWorldPos = new THREE.Vector3();
        let boxPlaced = false;
        let selectedZone = null;
        let isRunning = false;
        let foldedBox = null;

        function buildFlatBox(pos) {
            if (boxGroup) { scene.remove(boxGroup); boxGroup = null; }
            const g = new THREE.Group();
            // Main flat cardboard sheet
            const sheet = new THREE.Mesh(new THREE.BoxGeometry(BW, BH, BD), cardMat);
            g.add(sheet);
            // Fold crease lines on top face
            const creaseMat = new THREE.MeshBasicMaterial({ color: 0x8b4513 });
            [-.08, .0, .08].forEach(x => {
                const c = new THREE.Mesh(new THREE.BoxGeometry(.003, BH + .001, BD), creaseMat);
                c.position.x = x; g.add(c);
            });
            [-0.06, .06].forEach(z => {
                const c = new THREE.Mesh(new THREE.BoxGeometry(BW, BH + .001, .003), creaseMat);
                c.position.z = z; g.add(c);
            });
            g.position.copy(pos);
            g.castShadow = true; g.receiveShadow = true;
            boxGroup = g; scene.add(g);
            boxWorldPos.copy(pos);
        }

        function buildFoldedBox(pos) {
            if (foldedBox) { scene.remove(foldedBox); foldedBox = null; }
            const g = new THREE.Group();
            // Box body (17×25×9 cm → 0.17×0.25×0.09 m)
            const bw = .25, bh = .09, bd = .17;
            const outer = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), foldedMat);
            outer.position.y = bh / 2;
            g.add(outer);
            // Slightly darker inner face visible on top
            const innerTop = new THREE.Mesh(new THREE.PlaneGeometry(bw - .01, bd - .01), foldedInner);
            innerTop.rotation.x = -Math.PI / 2;
            innerTop.position.y = bh + .001;
            g.add(innerTop);
            // Fold crease lines on top
            const cr = new THREE.MeshBasicMaterial({ color: 0x7c4a00 });
            const cl1 = new THREE.Mesh(new THREE.BoxGeometry(.002, bh + .002, bd), cr);
            g.add(cl1);
            g.position.copy(pos);
            g.castShadow = true;
            foldedBox = g; scene.add(g);
        }

        // ── ZONE PLACEMENT ────────────────────────────────────────────
        window.placeBox = (zone) => {
            if (isRunning) return;
            // Update zone button styles
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('z-' + zone).classList.add('selected');
            // Reset zone highlight colors
            Object.values(zoneMeshes).forEach(m => m.material.color.set(0x1e3a5f));
            zoneMeshes[zone].material.color.set(0x1d4ed8);
            selectedZone = zone;

            const z = ZONES[zone];
            buildFlatBox(new THREE.Vector3(z.x, TABLE_TOP + BH / 2, z.z));
            document.getElementById('box-sts').textContent = 'วางแล้ว ✓';
            document.getElementById('box-sts').className = 'blue';
            document.getElementById('btn-start').disabled = false;
            document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-box"></i><span>วางกล่องที่ zone ' + zone + ' แล้ว — กด Start เพื่อเริ่ม</span>';
            boxPlaced = true;
        };

        // ── ANIMATION ─────────────────────────────────────────────────
        // Joint angle names: j0=base Y, j1=shoulder X, j2=elbow X, j3=wrist1 X, j4=wrist2 Y, j5=ee Z
        const HOME = { j0: 0, j1: -0.35, j2: 1.0, j3: -0.7, j4: 0, j5: 0 };
        let cur = { ...HOME }, tgt = { ...HOME }, frm = { ...HOME };
        let animT = 0, animDur = 0, onDone = null;

        function applyAngles(a) {
            J0.rotation.y = a.j0;
            J2.rotation.x = a.j1;
            J3.rotation.x = a.j2;
            J4.rotation.x = a.j3;
            J5.rotation.y = a.j4;
            J6.rotation.z = a.j5;
        }
        applyAngles(HOME);

        function ease(t) { return t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
        function anim(target, dur, cb) {
            frm = { ...cur }; tgt = { ...target }; animT = 0; animDur = dur; onDone = cb;
        }

        function setPhase(p) {
            for (let i = 0; i < 5; i++) {
                const el = document.getElementById('p' + i);
                el.className = 'ph' + (i < p ? ' done' : i === p ? ' act' : '');
            }
            document.getElementById('ph-cur').textContent = p < 5 ? ['APPROACH', 'PICK', 'LIFT', 'TRANSIT', 'FOLD'][p] : 'DONE ✓';
        }

        function getBaseAngle(bx, bz) {
            return Math.atan2(bx - RX, -(bz - RZ));
        }

        window.startSimulation = () => {
            if (!boxPlaced || isRunning) return;
            isRunning = true;
            ctrl.enabled = false;
            document.getElementById('btn-start').disabled = true;
            document.getElementById('sts').textContent = 'RUNNING';
            document.getElementById('sts').className = 'run';

            const bx = boxWorldPos.x, bz = boxWorldPos.z;
            const j0 = getBaseAngle(bx, bz);
            // Horizontal dist from robot base on table plane
            const dx = bx - RX, dz = bz - RZ;
            const dist = Math.sqrt(dx * dx + dz * dz);

            // Phase 0: Go to position ABOVE box (arm extended out, not down yet)
            setPhase(0);
            document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-arrows-to-dot"></i><span>ขยับแขนไปด้านบนกล่อง…</span>';
            anim({ j0, j1: -0.1, j2: 0.9, j3: -0.9, j4: 0, j5: 0 }, 2.5, () => {
                // Phase 1: PICK - bend down dramatically to table level
                setPhase(1);
                document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-hand"></i><span>โค้งลงดูดกล่อง…</span>';
                anim({ j0, j1: 0.65, j2: 1.35, j3: -1.7, j4: 0, j5: 0 }, 2.0, () => {
                    // Attach box
                    suctionGlow.intensity = 2.5;
                    if (boxGroup) {
                        J6.attach(boxGroup); // keep world position
                        // Flatten rotation relative to J6
                        boxGroup.rotation.set(0, 0, 0);
                        boxGroup.position.set(0, .068, 0);
                    }
                    // Phase 2: LIFT
                    setPhase(2);
                    document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-arrow-up"></i><span>ยกกล่องขึ้น…</span>';
                    anim({ j0, j1: -0.2, j2: 0.85, j3: -0.75, j4: 0, j5: 0 }, 1.8, () => {
                        // Phase 3: TRANSIT to folding station
                        setPhase(3);
                        document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-rotate-right"></i><span>เคลื่อนไปแท่นพับ…</span>';
                        const j0f = getBaseAngle(FOLD_X, FOLD_Z);
                        anim({ j0: j0f, j1: -0.1, j2: 0.9, j3: -0.85, j4: 0, j5: 0 }, 2.5, () => {
                            // Phase 4: PLACE (lower down to station)
                            setPhase(4);
                            document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-box-open"></i><span>วางและพับกล่อง…</span>';
                            anim({ j0: j0f, j1: 0.5, j2: 1.25, j3: -1.55, j4: 0, j5: 0 }, 2.0, () => {
                                // Release
                                suctionGlow.intensity = 0;
                                if (boxGroup) {
                                    scene.attach(boxGroup);
                                    scene.remove(boxGroup); boxGroup = null;
                                }
                                // Show 3D folded box
                                buildFoldedBox(new THREE.Vector3(FOLD_X, FOLD_Y + .001, FOLD_Z));
                                // Return home
                                setTimeout(() => {
                                    anim(HOME, 2.2, () => {
                                        isRunning = false; ctrl.enabled = true; boxPlaced = false;
                                        selectedZone = null;
                                        document.getElementById('sts').textContent = 'DONE ✓';
                                        document.getElementById('sts').className = 'ok';
                                        document.getElementById('box-sts').textContent = 'พับแล้ว ✓';
                                        document.getElementById('box-sts').className = 'ok';
                                        document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-check-circle"></i><span>เสร็จสิ้น! กล่องถูกพับแล้ว — กด Reset เพื่อเริ่มใหม่</span>';
                                        document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
                                        Object.values(zoneMeshes).forEach(m => m.material.color.set(0x1e3a5f));
                                        setPhase(5);
                                    });
                                }, 600);
                            });
                        });
                    });
                });
            });
        };

        // ── BUTTON BINDINGS ───────────────────────────────────────────
        document.getElementById('btn-start').addEventListener('click', window.startSimulation);
        document.getElementById('btn-reset').addEventListener('click', () => {
            if (boxGroup) { scene.remove(boxGroup); boxGroup = null; }
            if (foldedBox) { scene.remove(foldedBox); foldedBox = null; }
            // Detach any lingering box from J6
            while (J6.children.length > 3) J6.remove(J6.children[J6.children.length - 1]);
            isRunning = false; ctrl.enabled = true; boxPlaced = false; selectedZone = null;
            suctionGlow.intensity = 0; animDur = 0; animT = 0; cur = { ...HOME };
            applyAngles(HOME);
            document.getElementById('sts').textContent = 'IDLE'; document.getElementById('sts').className = 'idle';
            document.getElementById('ph-cur').textContent = '—';
            document.getElementById('box-sts').textContent = 'ยังไม่วาง'; document.getElementById('box-sts').className = 'idle';
            document.getElementById('btn-start').disabled = true;
            document.getElementById('info-txt').innerHTML = '<i class="fa-solid fa-table-cells"></i><span>เลือกตำแหน่ง A1-B3 เพื่อวางกล่องกระดาษบนโต๊ะ</span>';
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
            Object.values(zoneMeshes).forEach(m => m.material.color.set(0x1e3a5f));
            setPhase(-1);
        });

        // ── CAMERA PRESETS ────────────────────────────────────────────
        const CAM = {
            iso: [[1.4, 1.1, 1.7], [0, .4, 0]],
            front: [[0, .9, 2.2], [0, .4, 0]],
            side: [[2.2, .9, 0], [0, .4, 0]],
            top: [[0, 3, .001], [0, 0, 0]],
        };
        let cFrom = new THREE.Vector3(), cTo = new THREE.Vector3(), cTarget = new THREE.Vector3(0, .4, 0), cT = 1;
        window.setCamera = (n) => {
            const p = CAM[n];
            cFrom.copy(camera.position);
            cTo.set(...p[0]); cTarget.set(...p[1]); cT = 0;
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('act'));
            document.getElementById('cam-' + n)?.classList.add('act');
        };

        // ── MAIN LOOP ─────────────────────────────────────────────────
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Joint animation
            if (animDur > 0) {
                animT = Math.min(animT + dt / animDur, 1);
                const t = ease(animT);
                for (const k in cur) cur[k] = frm[k] + (tgt[k] - frm[k]) * t;
                applyAngles(cur);
                if (animT >= 1) { animDur = 0; if (onDone) { const f = onDone; onDone = null; f(); } }
            }

            // Camera tween
            if (cT < 1) {
                cT = Math.min(cT + dt * 1.8, 1);
                const t = ease(cT);
                camera.position.lerpVectors(cFrom, cTo, t);
                ctrl.target.lerp(cTarget, .12);
            }

            // Pulse robot light
            robotLight.intensity = 1.8 + .5 * Math.sin(Date.now() * .003);

            ctrl.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        setCamera('iso');
        animate();
    </script>
</body>

</html>
